<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AA%B6%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GraphThrift — cut LLM cost & latency for knowledge-graph ingestion, proven safe." />
    <title>GraphThrift · LLM cost optimizer</title>
    <script>
      // Set theme before paint to avoid flash. Dark by default.
      (function () {
        try {
          var stored = localStorage.getItem('graphthrift-theme')
          var dark = stored ? stored === 'dark' : true
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
