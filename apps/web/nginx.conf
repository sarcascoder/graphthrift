# Rendered by the nginx:alpine entrypoint via envsubst — ${BACKEND_URL} is
# substituted from the container environment at startup.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip static assets
    gzip              on;
    gzip_types        text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API + ops endpoints to the backend.
    location /v1/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /healthz { proxy_pass ${BACKEND_URL}; }
    location = /readyz  { proxy_pass ${BACKEND_URL}; }
    location = /metrics { proxy_pass ${BACKEND_URL}; }

    # SPA fallback — serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
